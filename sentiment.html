<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舆情分析 - 怪物猎人：旅人</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .page-header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        
        .page-header p {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .overview-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .overview-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            color: #2c3e50;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .overview-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .overview-card .value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .overview-card .label {
            color: #7f8c8d;
            font-size: 0.9em;
        }
        
        .overview-card.positive .value { color: #27ae60; }
        .overview-card.neutral .value { color: #f39c12; }
        .overview-card.negative .value { color: #e74c3c; }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            color: #2c3e50;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .chart-container h3 {
            margin-bottom: 20px;
            color: #3498db;
        }
        
        .topics-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            color: #2c3e50;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .topics-section h3 {
            margin-bottom: 15px;
            color: #3498db;
            font-size: 1.1em;
        }
        
        .topic-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .topic-tag {
            background: rgba(52, 152, 219, 0.15);
            color: #2980b9;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.95em;
        }
        
        .comments-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            color: #2c3e50;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .comments-section h3 {
            margin-bottom: 20px;
            color: #3498db;
        }
        
        .comment-group {
            margin-bottom: 25px;
        }
        
        .comment-group h4 {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
        }
        
        .comment-group.positive h4 { color: #27ae60; }
        .comment-group.neutral h4 { color: #f39c12; }
        .comment-group.negative h4 { color: #e74c3c; }
        
        .comment-item {
            background: rgba(0, 0, 0, 0.03);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .overview-cards {
                grid-template-columns: repeat(2, 1fr);
            }
            
            div[style*="grid-template-columns: 1fr 2fr 1.5fr"] {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回主页</a>
        
        <div class="page-header">
            <h1>💬 舆情分析</h1>
            <p>TapTap 评论舆情监控</p>
        </div>
        
        <!-- 第一行：好评率、中立率、差评率 -->
        <div class="overview-cards" style="grid-template-columns: repeat(3, 1fr);">
            <div class="overview-card positive">
                <div class="icon">👍</div>
                <div class="value" id="positiveRate">-</div>
                <div class="label">好评率</div>
            </div>
            <div class="overview-card neutral">
                <div class="icon">😐</div>
                <div class="value" id="neutralRate">-</div>
                <div class="label">中立率</div>
            </div>
            <div class="overview-card negative">
                <div class="icon">👎</div>
                <div class="value" id="negativeRate">-</div>
                <div class="label">差评率</div>
            </div>
        </div>
        
        <!-- 第二行：总评价数、情感分布、热门话题 -->
        <div style="display: grid; grid-template-columns: 1fr 2fr 1.5fr; gap: 20px; margin-bottom: 30px; align-items: stretch;">
            <div class="overview-card" style="margin-bottom: 0; display: flex; flex-direction: column; justify-content: center;">
                <div class="icon">📊</div>
                <div class="value" id="totalComments">-</div>
                <div class="label">总评价数</div>
            </div>
            <div class="chart-container" style="margin-bottom: 0;">
                <h3>📈 情感分布</h3>
                <canvas id="sentimentChart"></canvas>
            </div>
            <div class="topics-section" style="margin-bottom: 0;">
                <h3>🔥 热门话题</h3>
                <div class="topic-tags" id="hotTopics"></div>
            </div>
        </div>
        
        <div class="comments-section">
            <h3>💬 典型评论</h3>
            <div class="comment-group positive">
                <h4>👍 正面评价</h4>
                <div id="positiveComments"></div>
            </div>
            <div class="comment-group neutral">
                <h4>😐 中立评价</h4>
                <div id="neutralComments"></div>
            </div>
            <div class="comment-group negative">
                <h4>👎 负面评价</h4>
                <div id="negativeComments"></div>
            </div>
        </div>
    </div>
    
    <script>
        const sentimentData = {
            "daily_reports": [
                {
                    "date": "2026-04-02",
                    "summary": {
                        "positive": 60,
                        "neutral": 20,
                        "negative": 20,
                        "total_comments": 903
                    },
                    "hot_topics": [
                        "移动端便利性",
                        "操作优化",
                        "商业氪金机制",
                        "情怀与社交",
                        "画面与生态"
                    ],
                    "sample_comments": {
                        "positive": [
                            "移动端填补了碎片化时间的空白，解决了主机/PC没时间玩的问题",
                            "操作简化了（一键登龙、一键见切），手机上战斗爽感很足",
                            "移植了《世界》的动作模组和开放无缝地图，生态还原度高"
                        ],
                        "neutral": [
                            "快餐化与简化的矛盾，取消磨刀、增加血条降低了门槛但失去策略感",
                            "三星期待，建议买断制或月卡制避免逼氪"
                        ],
                        "negative": [
                            "腾讯给IP招黑，质量令人担忧",
                            "角色绑定武器装备、抽卡出角色破坏了怪猎的纯粹性"
                        ]
                    }
                }
            ],
            "history_summary": {
                "trend": "谨慎乐观"
            }
        };
        
        function loadSentiment() {
            const latest = sentimentData.daily_reports.slice(-1)[0];
            const summary = latest.summary;
            
            // 概览
            document.getElementById('positiveRate').textContent = summary.positive + '%';
            document.getElementById('neutralRate').textContent = summary.neutral + '%';
            document.getElementById('negativeRate').textContent = summary.negative + '%';
            document.getElementById('totalComments').textContent = summary.total_comments;
            
            // 情感分布图
            const ctx = document.getElementById('sentimentChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['正面', '中立', '负面'],
                    datasets: [{
                        data: [summary.positive, summary.neutral, summary.negative],
                        backgroundColor: ['#27ae60', '#f39c12', '#e74c3c'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
            
            // 热门话题
            document.getElementById('hotTopics').innerHTML = latest.hot_topics
                .map(topic => `<span class="topic-tag">${topic}</span>`).join('');
            
            // 评论
            document.getElementById('positiveComments').innerHTML = latest.sample_comments.positive
                .map(c => `<div class="comment-item">${c}</div>`).join('');
            document.getElementById('neutralComments').innerHTML = latest.sample_comments.neutral
                .map(c => `<div class="comment-item">${c}</div>`).join('');
            document.getElementById('negativeComments').innerHTML = latest.sample_comments.negative
                .map(c => `<div class="comment-item">${c}</div>`).join('');
        }
        
        loadSentiment();
    </script>
</body>
</html>
