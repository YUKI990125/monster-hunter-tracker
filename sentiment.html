<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舆情分析 - 怪物猎人：旅人</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .page-header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .page-header p {
            color: #95a5a6;
        }
        
        /* 情感概览 */
        .sentiment-overview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .sentiment-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sentiment-card.positive {
            border-top: 4px solid #2ecc71;
        }
        
        .sentiment-card.neutral {
            border-top: 4px solid #f39c12;
        }
        
        .sentiment-card.negative {
            border-top: 4px solid #e74c3c;
        }
        
        .sentiment-card .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .sentiment-card .value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .sentiment-card.positive .value { color: #2ecc71; }
        .sentiment-card.neutral .value { color: #f39c12; }
        .sentiment-card.negative .value { color: #e74c3c; }
        
        .sentiment-card .label {
            color: #95a5a6;
            font-size: 1em;
        }
        
        /* 趋势区域 */
        .trend-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .trend-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .trend-card h3 {
            margin-bottom: 20px;
            color: #3498db;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        /* 热门话题 */
        .topics-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .topics-section h3 {
            margin-bottom: 20px;
            color: #3498db;
        }
        
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .topic-group h4 {
            color: #f39c12;
            margin-bottom: 15px;
            font-size: 1em;
        }
        
        .topic-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .topic-tag {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .topic-tag.positive {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }
        
        .topic-tag.negative {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
        
        /* 示例评论 */
        .comments-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .comments-section h3 {
            margin-bottom: 20px;
            color: #3498db;
        }
        
        .comments-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .comment-group h4 {
            margin-bottom: 15px;
            font-size: 1em;
        }
        
        .comment-group.positive h4 { color: #2ecc71; }
        .comment-group.neutral h4 { color: #f39c12; }
        .comment-group.negative h4 { color: #e74c3c; }
        
        .comment-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            font-size: 0.9em;
            line-height: 1.5;
            color: #bdc3c7;
        }
        
        /* 历史趋势 */
        .history-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        
        .history-section h3 {
            margin-bottom: 20px;
            color: #3498db;
        }
        
        .history-chart {
            height: 250px;
        }
        
        /* 响应式 */
        @media (max-width: 900px) {
            .sentiment-overview,
            .trend-section,
            .topics-grid,
            .comments-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回主页</a>
        
        <div class="page-header">
            <h1>💬 舆情分析</h1>
            <p>TapTap 评论舆情监控与情感分析</p>
        </div>
        
        <!-- 情感概览 -->
        <div class="sentiment-overview">
            <div class="sentiment-card positive">
                <div class="icon">👍</div>
                <div class="value" id="positiveRate">-</div>
                <div class="label">好评率</div>
            </div>
            <div class="sentiment-card neutral">
                <div class="icon">😐</div>
                <div class="value" id="neutralRate">-</div>
                <div class="label">中立率</div>
            </div>
            <div class="sentiment-card negative">
                <div class="icon">👎</div>
                <div class="value" id="negativeRate">-</div>
                <div class="label">差评率</div>
            </div>
        </div>
        
        <!-- 趋势图表 -->
        <div class="trend-section">
            <div class="trend-card">
                <h3>📊 情感分布</h3>
                <div class="chart-container">
                    <canvas id="sentimentChart"></canvas>
                </div>
            </div>
            <div class="trend-card">
                <h3>📈 趋势分析</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 热门话题 -->
        <div class="topics-section">
            <h3>🔥 热门话题与关键词</h3>
            <div class="topics-grid">
                <div class="topic-group">
                    <h4>✅ 正面关键词</h4>
                    <div class="topic-tags" id="positiveKeywords">
                        <!-- 动态加载 -->
                    </div>
                </div>
                <div class="topic-group">
                    <h4>❌ 负面关键词</h4>
                    <div class="topic-tags" id="negativeKeywords">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <h4 style="color: #f39c12; margin-bottom: 15px;">🎯 热门话题</h4>
                <div class="topic-tags" id="hotTopics">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>
        
        <!-- 示例评论 -->
        <div class="comments-section">
            <h3>📝 评论示例</h3>
            <div class="comments-grid">
                <div class="comment-group positive">
                    <h4>👍 好评示例</h4>
                    <div id="positiveComments">
                        <!-- 动态加载 -->
                    </div>
                </div>
                <div class="comment-group neutral">
                    <h4>😐 中立示例</h4>
                    <div id="neutralComments">
                        <!-- 动态加载 -->
                    </div>
                </div>
                <div class="comment-group negative">
                    <h4>👎 差评示例</h4>
                    <div id="negativeComments">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 历史趋势 -->
        <div class="history-section">
            <h3>📅 历史舆情趋势</h3>
            <div class="history-chart">
                <canvas id="historyChart"></canvas>
            </div>
        </div>
    </div>
    
    <script>
        async function loadSentiment() {
            try {
                const res = await fetch('data/sentiment.json');
                const data = await res.json();
                
                const latestReport = data.daily_reports?.slice(-1)[0];
                
                if (latestReport) {
                    // 更新概览
                    document.getElementById('positiveRate').textContent = 
                        latestReport.summary.positive + '%';
                    document.getElementById('neutralRate').textContent = 
                        latestReport.summary.neutral + '%';
                    document.getElementById('negativeRate').textContent = 
                        latestReport.summary.negative + '%';
                    
                    // 更新关键词
                    const positiveKeywords = document.getElementById('positiveKeywords');
                    positiveKeywords.innerHTML = latestReport.positive_keywords?.map(k => 
                        `<span class="topic-tag positive">${k}</span>`
                    ).join('') || '<span class="topic-tag">暂无数据</span>';
                    
                    const negativeKeywords = document.getElementById('negativeKeywords');
                    negativeKeywords.innerHTML = latestReport.negative_keywords?.map(k => 
                        `<span class="topic-tag negative">${k}</span>`
                    ).join('') || '<span class="topic-tag">暂无数据</span>';
                    
                    const hotTopics = document.getElementById('hotTopics');
                    hotTopics.innerHTML = latestReport.hot_topics?.map(t => 
                        `<span class="topic-tag">${t}</span>`
                    ).join('') || '<span class="topic-tag">暂无数据</span>';
                    
                    // 更新评论示例
                    const positiveComments = document.getElementById('positiveComments');
                    positiveComments.innerHTML = latestReport.sample_comments?.positive?.map(c => 
                        `<div class="comment-item">${c}</div>`
                    ).join('') || '<div class="comment-item">暂无数据</div>';
                    
                    const neutralComments = document.getElementById('neutralComments');
                    neutralComments.innerHTML = latestReport.sample_comments?.neutral?.map(c => 
                        `<div class="comment-item">${c}</div>`
                    ).join('') || '<div class="comment-item">暂无数据</div>';
                    
                    const negativeComments = document.getElementById('negativeComments');
                    negativeComments.innerHTML = latestReport.sample_comments?.negative?.map(c => 
                        `<div class="comment-item">${c}</div>`
                    ).join('') || '<div class="comment-item">暂无数据</div>';
                    
                    // 情感分布饼图
                    new Chart(document.getElementById('sentimentChart'), {
                        type: 'doughnut',
                        data: {
                            labels: ['好评', '中立', '差评'],
                            datasets: [{
                                data: [
                                    latestReport.summary.positive,
                                    latestReport.summary.neutral,
                                    latestReport.summary.negative
                                ],
                                backgroundColor: ['#2ecc71', '#f39c12', '#e74c3c'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: { color: '#fff' }
                                }
                            }
                        }
                    });
                }
                
                // 历史趋势图
                const history = data.daily_reports || [];
                if (history.length > 0) {
                    new Chart(document.getElementById('historyChart'), {
                        type: 'line',
                        data: {
                            labels: history.map(h => h.date),
                            datasets: [
                                {
                                    label: '好评率',
                                    data: history.map(h => h.summary.positive),
                                    borderColor: '#2ecc71',
                                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                                    fill: false,
                                    tension: 0.4
                                },
                                {
                                    label: '中立率',
                                    data: history.map(h => h.summary.neutral),
                                    borderColor: '#f39c12',
                                    backgroundColor: 'rgba(243, 156, 18, 0.1)',
                                    fill: false,
                                    tension: 0.4
                                },
                                {
                                    label: '差评率',
                                    data: history.map(h => h.summary.negative),
                                    borderColor: '#e74c3c',
                                    backgroundColor: 'rgba(231, 76, 60, 0.1)',
                                    fill: false,
                                    tension: 0.4
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                x: { ticks: { color: '#95a5a6' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                                y: { ticks: { color: '#95a5a6' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                            },
                            plugins: {
                                legend: {
                                    position: 'top',
                                    labels: { color: '#fff' }
                                }
                            }
                        }
                    });
                }
                
                // 趋势分析（简化）
                const trend = data.history_summary?.trend || '稳定';
                const trendData = {
                    '上升': [30, 40, 50, 55, 60],
                    '下降': [70, 65, 55, 50, 45],
                    '稳定': [50, 52, 51, 53, 52]
                };
                
                new Chart(document.getElementById('trendChart'), {
                    type: 'line',
                    data: {
                        labels: ['5天前', '4天前', '3天前', '2天前', '昨天'],
                        datasets: [{
                            label: '好评率趋势',
                            data: trendData[trend] || trendData['稳定'],
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { ticks: { color: '#95a5a6' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                            y: { ticks: { color: '#95a5a6' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
                
            } catch (error) {
                console.error('数据加载失败:', error);
            }
        }
        
        loadSentiment();
    </script>
</body>
</html>
