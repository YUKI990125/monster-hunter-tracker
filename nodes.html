<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节点追踪 - 怪物猎人：旅人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .page-header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #9b59b6, #8e44ad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .page-header p {
            color: #95a5a6;
        }
        
        /* 时间线 */
        .timeline {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 0;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #9b59b6, #3498db);
            border-radius: 2px;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 40px;
            width: 45%;
        }
        
        .timeline-item:nth-child(odd) {
            margin-left: 5%;
        }
        
        .timeline-item:nth-child(even) {
            margin-left: 50%;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #9b59b6;
            border-radius: 50%;
            top: 20px;
            border: 4px solid #16213e;
            z-index: 1;
        }
        
        .timeline-item:nth-child(odd)::before {
            right: -32px;
        }
        
        .timeline-item:nth-child(even)::before {
            left: -32px;
        }
        
        .timeline-content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .timeline-content:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }
        
        .timeline-content.confirmed {
            border-left: 4px solid #2ecc71;
        }
        
        .timeline-content.pending {
            border-left: 4px solid #f39c12;
        }
        
        .timeline-content.none {
            border-left: 4px solid #95a5a6;
        }
        
        .node-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #f39c12;
        }
        
        .node-date {
            font-size: 1.5em;
            color: #3498db;
            margin-bottom: 5px;
        }
        
        .node-time {
            color: #95a5a6;
            margin-bottom: 10px;
        }
        
        .node-sources {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .source-tag {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }
        
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-top: 10px;
        }
        
        .status-tag.confirmed {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }
        
        .status-tag.pending {
            background: rgba(243, 156, 18, 0.2);
            color: #f39c12;
        }
        
        .status-tag.none {
            background: rgba(149, 165, 166, 0.2);
            color: #95a5a6;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .timeline::before {
                left: 20px;
            }
            
            .timeline-item,
            .timeline-item:nth-child(odd),
            .timeline-item:nth-child(even) {
                width: calc(100% - 50px);
                margin-left: 50px;
            }
            
            .timeline-item::before,
            .timeline-item:nth-child(odd)::before,
            .timeline-item:nth-child(even)::before {
                left: -40px;
                right: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回主页</a>
        
        <div class="page-header">
            <h1>📅 节点追踪</h1>
            <p>游戏关键节点时间线一览</p>
        </div>
        
        <div class="timeline" id="timeline">
            <!-- 动态加载 -->
        </div>
    </div>
    
    <script>
        async function loadNodes() {
            try {
                const res = await fetch('data/nodes.json');
                const data = await res.json();
                
                const timeline = document.getElementById('timeline');
                const nodes = data.nodes || {};
                
                // 动态获取节点顺序（按数据中实际存在的键排序）
                // 优先顺序：预约 -> 测试组（一测、二测等）-> 公测相关
                const priorityOrder = [
                    '预约开启',
                    '一测招募', '一测开启', '一测结束',
                    '二测招募', '二测开启', '二测结束',
                    '三测招募', '三测开启', '三测结束',
                    '公测首发定档', '前瞻直播', '预注册', '预下载', '公测开启'
                ];
                
                // 获取数据中存在的所有节点键
                const existingKeys = Object.keys(nodes);
                
                // 按优先顺序排列，同时包含不在优先列表中的节点
                const order = priorityOrder.filter(key => existingKeys.includes(key));
                
                // 添加不在优先列表中的其他节点（如未来可能有四测等）
                existingKeys.forEach(key => {
                    if (!order.includes(key)) {
                        order.push(key);
                    }
                });
                
                timeline.innerHTML = order.map(key => {
                    const node = nodes[key] || {};
                    const date = node.date || '待定';
                    const time = node.time || '';
                    const sources = node.source || [];
                    const status = node.status || '待定';
                    const note = node.note || '';
                    
                    let statusClass = 'pending';
                    if (status === '已确认') statusClass = 'confirmed';
                    if (status === '暂无') statusClass = 'none';
                    
                    return `
                        <div class="timeline-item">
                            <div class="timeline-content ${statusClass}">
                                <div class="node-name">${key}</div>
                                <div class="node-date">${date !== '待定' ? date : '待定'}</div>
                                ${time ? `<div class="node-time">时间：${time}</div>` : ''}
                                ${note ? `<div class="node-note" style="color: #7f8c8d; font-size: 0.9em; margin-top: 5px;">${note}</div>` : ''}
                                ${sources.length > 0 ? `
                                    <div class="node-sources">
                                        ${sources.map(s => `<span class="source-tag">${s}</span>`).join('')}
                                    </div>
                                ` : ''}
                                <span class="status-tag ${statusClass}">${status}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('数据加载失败:', error);
                document.getElementById('timeline').innerHTML = 
                    '<p style="text-align: center; color: #e74c3c;">数据加载失败</p>';
            }
        }
        
        loadNodes();
    </script>
</body>
</html>
