<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动追踪 - 怪物猎人：旅人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            color: #2c3e50;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            color: #fff;
        }
        
        .page-header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        
        .page-header p {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .section-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .activities-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .activity-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }
        
        .activity-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .activity-card.reward {
            border-left: 4px solid #e74c3c;
        }
        
        .activity-card.community {
            border-left: 4px solid #3498db;
        }
        
        .activity-card.new-activity {
            animation: pulse 2s infinite;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }
        
        .activity-card.has-link:hover::after {
            content: '🔗 点击跳转';
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: #3498db;
            font-size: 0.85em;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
            50% { box-shadow: 0 0 30px rgba(46, 204, 113, 0.5); }
        }
        
        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .activity-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #2c3e50;
            flex: 1;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .status-badge.active {
            background: rgba(46, 204, 113, 0.15);
            color: #27ae60;
        }
        
        .status-badge.ended {
            background: rgba(149, 165, 166, 0.15);
            color: #7f8c8d;
        }
        
        .status-badge.drawn {
            background: rgba(155, 89, 182, 0.15);
            color: #9b59b6;
        }
        
        .status-badge.expired {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }
        
        .activity-meta {
            display: flex;
            gap: 20px;
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        
        .activity-desc {
            color: #34495e;
            line-height: 1.6;
        }
        
        .new-badge {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            margin-left: 8px;
            animation: blink 1.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .activity-link-hint {
            display: inline-block;
            margin-top: 15px;
            color: #3498db;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回主页</a>
        
        <div class="page-header">
            <h1>🎁 活动追踪</h1>
            <p>各渠道论坛活动一览（点击卡片可跳转）</p>
        </div>
        
        <h2 class="section-title">🎊 有奖活动</h2>
        <div class="activities-grid" id="rewardActivities"></div>
        
        <h2 class="section-title">💬 社区活动</h2>
        <div class="activities-grid" id="communityActivities"></div>
    </div>
    
    <script>
        const activitiesData = {
            "reward_activities": [
                {
                    "title": "预约开启活动",
                    "channel": "官网",
                    "url": "https://mho.qq.com/web202507/index.html",
                    "status": "进行中",
                    "description": "预约游戏可获得专属奖励"
                },
                {
                    "title": "TapTap新春专属红包封面",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "已结束",
                    "description": "TapTap新春专属红包封面派送活动"
                },
                {
                    "title": "春节红包封面放送",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "已结束",
                    "description": "春节红包封面发放，数量有限领完为止"
                }
            ],
            "community_activities": [
                {
                    "title": "🆕 官方创作团招募",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "进行中",
                    "description": "官方创作团招募，提供创作支持、流量扶持及奖金激励",
                    "isNew": true
                },
                {
                    "title": "🆕 启程测试招募",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "进行中",
                    "description": "限号删档计费测试招募，仅限安卓设备，截止4月21日24点",
                    "isNew": true
                },
                {
                    "title": "启程测试招募FAQ",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "进行中",
                    "description": "启程测试常见问题解答"
                },
                {
                    "title": "社区问卷调研",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "已过期",
                    "description": "社区问卷调研活动，奖品为镭射票"
                },
                {
                    "title": "分享集会所故事",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "已开奖",
                    "description": "分享集会所故事活动"
                },
                {
                    "title": "TapTap体验团资格公布",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "已开奖",
                    "description": "TapTap体验团资格公布"
                },
                {
                    "title": "年度游戏大赏投票",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "已开奖",
                    "description": "TapTap年度游戏大赏投票支持活动"
                },
                {
                    "title": "冒险团情报会",
                    "channel": "TapTap",
                    "url": "https://www.taptap.cn/app/243984/topic?type=official",
                    "status": "已结束",
                    "description": "新版本武器预告直播"
                }
            ]
        };
        
        function loadActivities() {
            // 有奖活动
            const rewardContainer = document.getElementById('rewardActivities');
            rewardContainer.innerHTML = activitiesData.reward_activities.map(activity => {
                let statusClass = 'active';
                if (activity.status === '已结束') statusClass = 'ended';
                else if (activity.status === '已开奖') statusClass = 'drawn';
                else if (activity.status === '已过期') statusClass = 'expired';
                
                const url = activity.url;
                const hasLink = url && url !== '#';
                const cardClass = hasLink ? 'activity-card reward has-link' : 'activity-card reward';
                
                return `
                    <div class="${cardClass}" onclick="${hasLink ? `window.open('${url}', '_blank')` : ''}">
                        <div class="activity-header">
                            <div class="activity-title">${activity.title}</div>
                            <span class="status-badge ${statusClass}">${activity.status}</span>
                        </div>
                        <div class="activity-meta">
                            <span>📍 ${activity.channel}</span>
                        </div>
                        <div class="activity-desc">${activity.description}</div>
                        ${hasLink ? '<span class="activity-link-hint">点击查看详情 →</span>' : ''}
                    </div>
                `;
            }).join('');
            
            // 社区活动
            const communityContainer = document.getElementById('communityActivities');
            communityContainer.innerHTML = activitiesData.community_activities.map(activity => {
                let statusClass = 'active';
                if (activity.status === '已结束') statusClass = 'ended';
                else if (activity.status === '已开奖') statusClass = 'drawn';
                else if (activity.status === '已过期') statusClass = 'expired';
                
                const url = activity.url;
                const hasLink = url && url !== '#';
                const isNew = activity.isNew;
                let cardClass = 'activity-card community';
                if (isNew) cardClass += ' new-activity';
                if (hasLink) cardClass += ' has-link';
                
                const titleText = activity.title.replace('🆕 ', '').replace('🆕', '');
                const newBadge = isNew ? '<span class="new-badge">NEW</span>' : '';
                
                return `
                    <div class="${cardClass}" onclick="${hasLink ? `window.open('${url}', '_blank')` : ''}">
                        <div class="activity-header">
                            <div class="activity-title">${titleText}${newBadge}</div>
                            <span class="status-badge ${statusClass}">${activity.status}</span>
                        </div>
                        <div class="activity-meta">
                            <span>📍 ${activity.channel}</span>
                        </div>
                        <div class="activity-desc">${activity.description}</div>
                        ${hasLink ? '<span class="activity-link-hint">点击查看详情 →</span>' : ''}
                    </div>
                `;
            }).join('');
        }
        
        loadActivities();
    </script>
</body>
</html>
